<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
    <title>αльфа-βета Мини</title>
      <style>

      * {
        margin: 0;
          padding: 0;
            box-sizing: border-box;
            }

            body {
                        font-family: Times New Roman, Verdana;
                                    background-color: Black;
                                                margin: 20px;
                                                        }
                                                                h1 {
                                                                            color: Violet;
                                                                                    }
                                                                                            p {
                                                                                                        color: White;
                                                                                                                }
                                                                                                                		input {
                                                                                                                                            padding: 10px 20px;
                                                                                                                                                        background-color: Violet;
                                                                                                                                                                    color: white;
                                                                                                                                                                                border: Green;
                                                                                                                                                                                            cursor: Green;
                                                                                                                                                                                            		}
                                                                                                                                                                                                        		a {
                                                                                                                                                                                                                                    padding: 1px 10px;
                                                                                                                                                                                                                                                background-color: Green;
                                                                                                                                                                                                                                                            color: white;
                                                                                                                                                                                                                                                                        border: Green;
                                                                                                                                                                                                                                                                                    cursor: Green;	

                                                                                                                                                                                                                                                                                    .messenger {
                                                                                                                                                                                                                                                                                      max-width: 500px;
                                                                                                                                                                                                                                                                                        margin: 20px auto;
                                                                                                                                                                                                                                                                                          border: 1px solid #ddd;
                                                                                                                                                                                                                                                                                            border-radius: 8px;
                                                                                                                                                                                                                                                                                              overflow: hidden;
                                                                                                                                                                                                                                                                                                background: white;
                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                .messenger h2 {
                                                                                                                                                                                                                                                                                                  text-align: center;
                                                                                                                                                                                                                                                                                                    padding: 15px;
                                                                                                                                                                                                                                                                                                      background: #007bff;
                                                                                                                                                                                                                                                                                                        color: white;
                                                                                                                                                                                                                                                                                                          margin: 0;
                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                          .messages {
                                                                                                                                                                                                                                                                                                            height: 400px;
                                                                                                                                                                                                                                                                                                              padding: 15px;
                                                                                                                                                                                                                                                                                                                overflow-y: auto;
                                                                                                                                                                                                                                                                                                                  background: #f9f9f9;
                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                  .message {
                                                                                                                                                                                                                                                                                                                    margin-bottom: 10px;
                                                                                                                                                                                                                                                                                                                      padding: 8px 12px;
                                                                                                                                                                                                                                                                                                                        border-radius: 18px;
                                                                                                                                                                                                                                                                                                                          max-width: 70%;
                                                                                                                                                                                                                                                                                                                            word-wrap: break-word;
                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                            .my-message {
                                                                                                                                                                                                                                                                                                                              background: #007bff;
                                                                                                                                                                                                                                                                                                                                color: white;
                                                                                                                                                                                                                                                                                                                                  margin-left: auto;
                                                                                                                                                                                                                                                                                                                                    text-align: right;
                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                    .other-message {
                                                                                                                                                                                                                                                                                                                                      background: #e5e5e5;
                                                                                                                                                                                                                                                                                                                                        color: black;
                                                                                                                                                                                                                                                                                                                                          margin-right: auto;
                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                          .input-area {
                                                                                                                                                                                                                                                                                                                                            display: flex;
                                                                                                                                                                                                                                                                                                                                              padding: 10px;
                                                                                                                                                                                                                                                                                                                                                border-top: 1px solid #ddd;
                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                #messageInput {
                                                                                                                                                                                                                                                                                                                                                  flex: 1;
                                                                                                                                                                                                                                                                                                                                                    padding: 10px;
                                                                                                                                                                                                                                                                                                                                                      border: 1px solid #ddd;
                                                                                                                                                                                                                                                                                                                                                        border-radius: 20px;
                                                                                                                                                                                                                                                                                                                                                          outline: none;
                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                          #sendButton {
                                                                                                                                                                                                                                                                                                                                                            padding: 10px 20px;
                                                                                                                                                                                                                                                                                                                                                              margin-left: 10px;
                                                                                                                                                                                                                                                                                                                                                                background: #007bff;
                                                                                                                                                                                                                                                                                                                                                                  color: white;
                                                                                                                                                                                                                                                                                                                                                                    border: none;
                                                                                                                                                                                                                                                                                                                                                                      border-radius: 20px;
                                                                                                                                                                                                                                                                                                                                                                        cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                        #sendButton:hover {
                                                                                                                                                                                                                                                                                                                                                                          background: #0056b3;
                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                                                                          </head>
                                                                                                                                                                                                                                                                                                                                                                          <body>
                                                                                                                                                                                                                                                                                                                                                                            <div class="messenger">
                                                                                                                                                                                                                                                                                                                                                                                <h2>αльфа-βета Мини</h2>
                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                        <div class="messages" id="messages">
                                                                                                                                                                                                                                                                                                                                                                                              <!-- Сообщения будут отображаться здесь -->
                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                          <div class="input-area">
                                                                                                                                                                                                                                                                                                                                                                                                                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                                                                                                                                                                                                                                                                                                                                                                                                                      <button id="sendButton">Отправить</button>
                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                <script>document.addEventListener('DOMContentLoaded', function() {
                                                                                                                                                                                                                                                                                                                                                                                                                                  const messagesContainer = document.getElementById('messages');
                                                                                                                                                                                                                                                                                                                                                                                                                                    const messageInput = document.getElementById('messageInput');
                                                                                                                                                                                                                                                                                                                                                                                                                                      const sendButton = document.getElementById('sendButton');
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                          // Загружаем сообщения из localStorage
                                                                                                                                                                                                                                                                                                                                                                                                                                            loadMessages();
                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                // Обработчик нажатия кнопки «Отправить»
                                                                                                                                                                                                                                                                                                                                                                                                                                                  sendButton.addEventListener('click', addMessage);
                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                      // Обработчик нажатия Enter в поле ввода
                                                                                                                                                                                                                                                                                                                                                                                                                                                        messageInput.addEventListener('keypress', function(e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (e.key === 'Enter') {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  addMessage();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function addMessage() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const text = messageInput.value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!text) return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Создаём объект сообщения
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const message = {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      id: Date.now(),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            text: text,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  timestamp: new Date().toLocaleTimeString(),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        isMyMessage: true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Добавляем в DOM
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        renderMessage(message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Сохраняем в localStorage
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    saveMessage(message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Очищаем поле ввода
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                messageInput.value = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function renderMessage(message) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const messageElement = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              messageElement.className = `message ${message.isMyMessage ? 'my-message' : 'other-message'}`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      messageElement.innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div>${message.text}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <small>${message.timestamp}</small>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              messagesContainer.appendChild(messageElement);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  scrollToBottom();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function saveMessage(message) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let messages = JSON.parse(localStorage.getItem('messengerMessages')) || [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                messages.push(message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    localStorage.setItem('messengerMessages', JSON.stringify(messages));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function loadMessages() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const messages = JSON.parse(localStorage.getItem('messengerMessages')) || [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      messages.forEach(message => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            renderMessage(message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function scrollToBottom() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
